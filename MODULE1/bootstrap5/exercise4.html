<!DOCTYPE html>
<html>

<head>

    <title>Bootstrap Columns</title>

    <link rel="stylesheet"
    href="css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <div class="row">

            <div class="col-sm-4 bg-primary text-white p-3">
                Left Side
            </div>

            <div class="col-sm-4 bg-success text-white p-3">
                Middle
            </div>

            <div class="col-sm-4 bg-danger text-white p-3">
                Right Side
            </div>

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
