<!DOCTYPE html>
<html>

<head>

    <title>Button Groups</title>

    <link rel="stylesheet"
    href="css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <h2 class="mb-3">
            Button Group
        </h2>

        <div class="btn-group">

            <button class="btn btn-primary">
                Left
            </button>

            <button class="btn btn-success">
                Middle
            </button>

            <button class="btn btn-danger">
                Right
            </button>

        </div>

        <hr>

        <h2 class="mb-3">
            Toggle Buttons
        </h2>

        <input type="checkbox"
        class="btn-check"
        id="btncheck1">

        <label class="btn btn-outline-primary"
        for="btncheck1">

            Toggle 1

        </label>

        <input type="checkbox"
        class="btn-check"
        id="btncheck2">

        <label class="btn btn-outline-success"
        for="btncheck2">

            Toggle 2

        </label>

    </div>

    <script src="js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
