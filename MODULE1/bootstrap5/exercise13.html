<!DOCTYPE html>
<html>

<head>

    <title>Registration Form</title>

    <link rel="stylesheet"
    href="css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <h2 class="mb-4">
            Registration Form
        </h2>

        <form>

            <div class="mb-3">

                <label class="form-label">
                    Name
                </label>

                <input type="text"
                class="form-control"
                placeholder="Enter Name">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input type="email"
                class="form-control"
                placeholder="Enter Email">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Gender
                </label>

                <div class="form-check">

                    <input type="radio"
                    class="form-check-input"
                    name="gender">

                    <label class="form-check-label">
                        Male
                    </label>

                </div>

                <div class="form-check">

                    <input type="radio"
                    class="form-check-input"
                    name="gender">

                    <label class="form-check-label">
                        Female
                    </label>

                </div>

            </div>

            <div class="input-group mb-3">

                <span class="input-group-text">
                    @
                </span>

                <input type="text"
                class="form-control"
                placeholder="Username">

            </div>

            <button class="btn btn-primary">
                Register
            </button>

        </form>

    </div>

    <script src="js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
