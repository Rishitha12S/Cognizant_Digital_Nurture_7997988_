<!DOCTYPE html>
<html>

<head>

    <title>Typography</title>

    <link rel="stylesheet"
    href="css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <h1 class="display-1">
            Bootstrap Heading
        </h1>

        <p class="lead">
            This is a lead paragraph.
        </p>

        <p class="text-muted">
            Muted text example.
        </p>

        <p class="fw-bold">
            Bold text example.
        </p>

    </div>

    <script src="js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
